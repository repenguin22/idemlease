name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.22.x = go.mod の下限、stable = 最新リリース
        go: ["1.22.x", "stable"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt differs:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...
      # 契約 §12-12: コアパッケージは net/http に（推移的にも）依存しない
      - name: core must not depend on net/http (REQUIREMENTS §12-12)
        run: |
          if go list -deps . | grep -qx 'net/http'; then
            echo 'NG: core package depends on net/http'
            exit 1
          fi
          echo 'OK: core package does not depend on net/http'
      # ランタイム依存ゼロ: テストヘルパー（go-cmp 等）がビルド依存に漏れていないこと
      - name: root module build deps must be stdlib-only
        run: |
          deps="$(go list -deps ./... | grep -v '^github.com/repenguin22/idemlease' | awk -F/ '$1 ~ /\./')"
          if [ -n "$deps" ]; then
            echo 'NG: third-party build deps found:'
            echo "$deps"
            exit 1
          fi
          echo 'OK: build deps are stdlib-only'

  redistore:
    name: redistore (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22.x", "stable"]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      REDIS_ADDR: localhost:6379
    defaults:
      run:
        working-directory: redistore
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt differs:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      # 適合性テスト全件（idemleasetest + httpidemtest）を実 Redis に対して実行
      - name: go test
        run: go test -race ./...
