name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.22.x = go.mod の下限、stable = 最新リリース
        go: ["1.22.x", "stable"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt differs:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...
      # 契約 §12-12: コアパッケージは net/http に（推移的にも）依存しない
      - name: core must not depend on net/http (REQUIREMENTS §12-12)
        run: |
          if go list -deps . | grep -qx 'net/http'; then
            echo 'NG: core package depends on net/http'
            exit 1
          fi
          echo 'OK: core package does not depend on net/http'
      # ランタイム依存ゼロ: テストヘルパー（go-cmp 等）がビルド依存に漏れていないこと
      - name: root module build deps must be stdlib-only
        run: |
          deps="$(go list -deps ./... | grep -v '^github.com/repenguin22/idemlease' | awk -F/ '$1 ~ /\./')"
          if [ -n "$deps" ]; then
            echo 'NG: third-party build deps found:'
            echo "$deps"
            exit 1
          fi
          echo 'OK: build deps are stdlib-only'

  redistore:
    name: redistore (go ${{ matrix.go }}, ${{ matrix.server.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22.x", "stable"]
        # Redis 本家と Valkey（互換実装）の両方で適合性を常時検証する
        server:
          - name: redis
            image: redis:7-alpine
            health_cmd: redis-cli ping
          - name: valkey
            image: valkey/valkey:8-alpine
            health_cmd: valkey-cli ping
    services:
      redis:
        image: ${{ matrix.server.image }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "${{ matrix.server.health_cmd }}"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      REDIS_ADDR: localhost:6379
    defaults:
      run:
        working-directory: redistore
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt differs:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      # 適合性テスト全件（idemleasetest + httpidemtest）を実 Redis に対して実行
      - name: go test
        run: go test -race ./...

  pgstore:
    name: pgstore (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22.x", "stable"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: idemlease_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      PG_DSN: "postgres://postgres:postgres@localhost:5432/idemlease_test?sslmode=disable"
    defaults:
      run:
        working-directory: pgstore
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt differs:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      # 適合性テスト全件（idemleasetest + httpidemtest）を実 PostgreSQL に対して実行
      - name: go test
        run: go test -race -timeout 180s ./...

  ginadapter:
    name: ginadapter (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22.x", "stable"]
    defaults:
      run:
        working-directory: ginadapter
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt differs:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...

  echo-e2e:
    name: echo-e2e (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22.x", "stable"]
    defaults:
      run:
        working-directory: e2e/echoe2e
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...

  # §12-8 カナリア: errtrail アダプタが httpidem の公開 API のみで
  # 実装可能であり続けることを機械的に担保する
  errtrailadapter-prototype:
    name: errtrailadapter prototype (canary)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/prototypes/errtrailadapter
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...
